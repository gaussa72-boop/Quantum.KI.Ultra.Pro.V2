<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Design</title>
    <!DOCTYPE html>
    <html>
    <head>
        <title>UltraKI Pro V2</title>
        <style>
            body { background: #0a0a12; color: white; font-family: sans-serif; overflow: hidden; height: 100vh; display: flex; flex-direction: column; }
            .bg-magic { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); z-index: -1; opacity: 0.1; }
            header { border-bottom: 2px solid gold; padding: 10px; text-align: center; background: rgba(0,0,0,0.5); }
            #chat-box { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 10px; }
            .msg { padding: 10px; border-radius: 10px; max-width: 80%; border: 1px solid cyan; box-shadow: 0 0 10px cyan; }
            .user { align-self: flex-end; background: #2b0054; }
            .ai { align-self: flex-start; background: #1a1a1a; border-color: gold; box-shadow: 0 0 10px gold; }
            .input-area { padding: 20px; display: flex; gap: 10px; background: black; }
            input { flex: 1; padding: 10px; border-radius: 5px; }
            button { background: gold; border: none; padding: 10px 20px; cursor: pointer; font-weight: bold; }
        </style>
    </head>
    <body>
    <svg class="bg-magic" width="300" height="300">
        <polygon points="150,50 250,250 50,250" fill="none" stroke="gold" stroke-width="2"/>
    </svg>
    <header><h1>ULTRAKI PRO V2</h1></header>
    <div id="chat-box"></div>
    <div class="input-area">
        <input type="text" id="msg" placeholder="Frag die Magie...">
        <button onclick="send()">SENDEN</button>
    </div>
    <script>
        async function send() {
            const i = document.getElementById("msg"), b = document.getElementById("chat-box");
            if(!i.value) return;
            b.innerHTML += `<div class="msg user">${i.value}</div>`;
            const res = await fetch("/chat", { method: "POST", headers: {"Content-Type":"application/json"}, body: JSON.stringify({message: i.value}) });
            i.value = "";
            const data = await res.json();
            b.innerHTML += `<div class="msg ai">${data.reply}</div>`;
            b.scrollTop = b.scrollHeight;
        }
    </script>
    </body>
    </html>
